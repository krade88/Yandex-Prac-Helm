# Backend values
enabled: true
image:
  repository: sausage-store/sausage-backend
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
service:
  type: ClusterIP
  port: 8080
secrets:
  dbPassword: "backend-db-password"
  apiKey: "backend-api-key"
