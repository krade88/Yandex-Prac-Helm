# Frontend values
enabled: true
image:
  repository: sausage-store/sausage-frontend
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  fqdn: std-mcpro-20.k8s.praktikum-services.tech
  tls:
    enabled: true
    secretName: sausage-store-tls
secrets:
  apiEndpoint: "http://sausage-backend:8080"
