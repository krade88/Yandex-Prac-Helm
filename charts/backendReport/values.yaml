# Backend Report values
enabled: true
image:
  repository: sausage-store/sausage-backend-report
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 1
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
service:
  type: ClusterIP
  port: 8081
secrets:
  dbPassword: "report-db-password"
