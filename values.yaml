# Global settings
global:
  imageRegistry: gitlab.praktikum-services.ru:5050
  project: std-mcpro-20
  vault:
    address: https://vault.praktikum-services.tech
    path: secret/data/sausage-store
  database:
    connectionString: postgresql://sausage_user:password@postgres.default.svc.cluster.local:5432/sausage_store

# Environment settings
environment: production

# Backend component settings
backend:
  enabled: true
  image:
    repository: sausage-store/sausage-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 8080
  secrets:
    dbPassword: "backend-db-password"
    apiKey: "backend-api-key"

# Backend Report component settings
backendReport:
  enabled: true
  image:
    repository: sausage-store/sausage-backend-report
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  service:
    type: ClusterIP
    port: 8081
  secrets:
    dbPassword: "report-db-password"

# Frontend component settings
frontend:
  enabled: true
  image:
    repository: sausage-store/sausage-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    fqdn: std-mcpro-20.k8s.praktikum-services.tech
    tls:
      enabled: true
      secretName: sausage-store-tls
  secrets:
    apiEndpoint: "http://sausage-backend:8080"
